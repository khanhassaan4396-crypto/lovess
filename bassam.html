<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bassam weds Summaiya</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Cinzel:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --gold: #c9a84c; --gold-light: #e8c97a; --gold-pale: #f5e6b8;
    --cream: #fdf8ef; --dark: #1a1208; --brown: #3d2b0e;
  }
  body {
    min-height: 100vh; background: var(--dark);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Cormorant Garamond', serif;
    overflow: hidden; cursor: pointer; user-select: none;
  }
  .stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
  .star {
    position: absolute; background: var(--gold-pale); border-radius: 50%;
    animation: twinkle var(--d) ease-in-out infinite; opacity: 0;
  }
  @keyframes twinkle { 0%,100%{opacity:0} 50%{opacity:var(--o)} }
  .petals { position: fixed; inset: 0; pointer-events: none; z-index: 1; overflow: hidden; }
  .petal { position: absolute; top: -40px; font-size: 18px; animation: fall linear infinite; opacity: 0; }
  @keyframes fall { 0%{transform:translateY(-40px) rotate(0deg);opacity:.7} 100%{transform:translateY(110vh) rotate(720deg);opacity:0} }
  .card {
    position: relative; z-index: 10; width: min(90vw, 480px); min-height: 520px;
    background: linear-gradient(160deg, #1e1506 0%, #0f0b03 60%, #1a1208 100%);
    border: 1px solid var(--gold); border-radius: 4px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 50px 40px; text-align: center; overflow: hidden;
    box-shadow: 0 0 0 1px rgba(201,168,76,.15), 0 0 60px rgba(201,168,76,.08), 0 30px 80px rgba(0,0,0,.7);
    transition: box-shadow .3s ease;
  }
  .card:active { box-shadow: 0 0 0 1px rgba(201,168,76,.3), 0 0 80px rgba(201,168,76,.15), 0 20px 60px rgba(0,0,0,.7); }
  .corner { position: absolute; width: 60px; height: 60px; border-color: var(--gold); border-style: solid; opacity: .6; }
  .corner.tl { top:12px; left:12px; border-width:1px 0 0 1px; }
  .corner.tr { top:12px; right:12px; border-width:1px 1px 0 0; }
  .corner.bl { bottom:12px; left:12px; border-width:0 0 1px 1px; }
  .corner.br { bottom:12px; right:12px; border-width:0 1px 1px 0; }
  .divider { width:120px; height:1px; background:linear-gradient(90deg,transparent,var(--gold),transparent); margin:16px auto; opacity:.7; }
  .diamond { color:var(--gold); font-size:14px; line-height:1; animation:spin-slow 8s linear infinite; display:inline-block; }
  @keyframes spin-slow { to{transform:rotate(360deg)} }
  .section { width:100%; display:flex; flex-direction:column; align-items:center; gap:6px; animation:fadeUp .8s cubic-bezier(.16,1,.3,1) both; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:translateY(0)} }
  .label { font-family:'Cinzel',serif; font-size:9px; letter-spacing:.35em; color:var(--gold); text-transform:uppercase; opacity:.75; }
  .big-text { font-family:'Cormorant Garamond',serif; font-size:clamp(36px,9vw,52px); font-weight:300; color:var(--cream); line-height:1.1; letter-spacing:.02em; }
  .big-text em { font-style:italic; color:var(--gold-light); }
  .weds-text { font-family:'Cormorant Garamond',serif; font-style:italic; font-size:18px; color:var(--gold); opacity:.85; letter-spacing:.15em; }
  .time-text { font-family:'Cormorant Garamond',serif; font-size:clamp(44px,12vw,68px); font-weight:300; color:var(--gold-light); letter-spacing:.05em; line-height:1; }
  .sub-text { font-family:'Cinzel',serif; font-size:11px; letter-spacing:.3em; color:var(--cream); opacity:.6; text-transform:uppercase; }
  .tap-hint { position:absolute; bottom:28px; left:0; right:0; text-align:center; font-family:'Cinzel',serif; font-size:8px; letter-spacing:.4em; color:var(--gold); opacity:0; text-transform:uppercase; animation:pulse-hint 2.5s ease-in-out infinite 1.5s; }
  @keyframes pulse-hint { 0%,100%{opacity:0} 50%{opacity:.5} }
  .burst { position:absolute; inset:0; background:radial-gradient(circle at 50% 50%,rgba(201,168,76,.12) 0%,transparent 70%); opacity:0; pointer-events:none; animation:burst-flash .5s ease-out; }
  @keyframes burst-flash { 0%{opacity:1} 100%{opacity:0} }
  .step-gap { display:flex; flex-direction:column; align-items:center; gap:20px; width:100%; }
</style>
</head>
<body>
<div class="stars" id="stars"></div>
<div class="petals" id="petals"></div>
<div class="card" id="card" onclick="nextStep()">
  <div class="corner tl"></div><div class="corner tr"></div>
  <div class="corner bl"></div><div class="corner br"></div>
  <div id="content"></div>
  <div class="tap-hint" id="tapHint">tap to reveal</div>
</div>
<script>
  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 90; i++) {
    const s = document.createElement('div'); s.className = 'star';
    const size = Math.random()*2.5+0.5;
    s.style.cssText = `left:${Math.random()*100}%;top:${Math.random()*100}%;width:${size}px;height:${size}px;--d:${(Math.random()*4+2).toFixed(1)}s;--o:${(Math.random()*.7+.2).toFixed(2)};animation-delay:${(Math.random()*6).toFixed(1)}s;`;
    starsEl.appendChild(s);
  }
  const petalsEl = document.getElementById('petals');
  const petalSymbols = ['✿','❀','✾','❁','✽'];
  function spawnPetal() {
    const p = document.createElement('div'); p.className = 'petal';
    p.textContent = petalSymbols[Math.floor(Math.random()*petalSymbols.length)];
    p.style.cssText = `left:${Math.random()*100}%;font-size:${Math.random()*14+10}px;color:hsl(${40+Math.random()*20},${60+Math.random()*30}%,${70+Math.random()*20}%);animation-duration:${(Math.random()*6+5).toFixed(1)}s;animation-delay:${(Math.random()*3).toFixed(1)}s;`;
    petalsEl.appendChild(p); setTimeout(()=>p.remove(),12000);
  }
  setInterval(spawnPetal, 600);

  let step = 0;
  const content = document.getElementById('content');
  const tapHint = document.getElementById('tapHint');
  const card = document.getElementById('card');
  const steps = [
    ()=>`<div class="section step-gap"><div class="label">with the blessings of Allah</div><div class="divider"></div><div><div class="big-text"><em>Bassam</em></div><div class="weds-text">weds</div><div class="big-text"><em>Summaiya</em></div></div><div class="divider"></div><span class="diamond">◆</span></div>`,
    ()=>`<div class="section step-gap"><div class="label">Save the date</div><div class="time-text">21</div><div class="big-text" style="font-size:clamp(26px,7vw,38px);color:var(--gold-light)">July 2025</div><div class="divider"></div><div class="sub-text">mark your calendars</div></div>`,
    ()=>`<div class="section step-gap"><div class="label">Nikah Ceremony</div><div class="divider"></div><div class="time-text">2 PM</div><div class="sub-text" style="font-size:20px;font-family:'Cormorant Garamond',serif;letter-spacing:0">نکاح</div><div class="divider"></div><div class="label">join us in prayers & blessings</div></div>`,
    ()=>`<div class="section step-gap"><div class="label">Walima Dinner</div><div class="divider"></div><div class="time-text">5 PM</div><div class="sub-text" style="font-size:20px;font-family:'Cormorant Garamond',serif;letter-spacing:0">ولیمہ</div><div class="divider"></div><div class="label">dinner & celebrations await</div></div>`,
    ()=>`<div class="section step-gap"><div class="label">you are cordially invited</div><div class="divider"></div><div class="big-text" style="font-size:clamp(28px,7vw,40px)">See you there <em>♡</em></div><div style="margin-top:8px;font-family:'Cormorant Garamond',serif;font-style:italic;color:var(--gold);font-size:15px;opacity:.8;letter-spacing:.05em">بارک اللہ لکم</div><div class="divider"></div><span class="diamond">◆</span></div>`,
  ];
  function render() {
    content.innerHTML = steps[step]();
    const b = document.createElement('div'); b.className = 'burst';
    card.appendChild(b); setTimeout(()=>b.remove(),500);
    tapHint.style.display = step >= steps.length-1 ? 'none' : 'block';
  }
  function nextStep() { step = step < steps.length-1 ? step+1 : 0; render(); }
  render();
</script>
</body>
</html>
