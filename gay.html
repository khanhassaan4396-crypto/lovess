<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>💅</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a2e;min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:Georgia,serif;overflow:hidden}
.card{text-align:center;padding:3rem 2rem;background:#16213e;border-radius:2rem;box-shadow:0 20px 60px rgba(255,0,128,0.3);max-width:400px;width:90vw}
h1{color:#ff69b4;font-size:1rem;margin-bottom:2rem;opacity:0.8}
.btn{width:150px;height:150px;border:none;border-radius:50%;background:linear-gradient(135deg,#ff0080,#7928ca,#ff0080);cursor:pointer;font-size:3rem;box-shadow:0 8px 30px rgba(255,0,128,0.5);-webkit-tap-highlight-color:transparent;touch-action:manipulation;animation:spin 4s linear infinite}
@keyframes spin{0%{background-position:0%}100%{background-position:100%}}
.msg{margin-top:2rem;font-size:1.6rem;color:#ff69b4;min-height:2.5rem;opacity:0;transition:opacity 0.4s;font-weight:bold}
.msg.show{opacity:1}
.sub{margin-top:0.5rem;font-size:0.85rem;color:#a78bfa;min-height:1rem}
.burst{position:fixed;pointer-events:none;z-index:999;font-size:1.4rem;animation:burst 0.9s ease-out forwards}
@keyframes burst{0%{opacity:1;transform:translate(0,0)}100%{opacity:0;transform:translate(var(--dx),var(--dy))}}
</style>
</head>
<body>
<div class="card">
<h1>tap it gay 💅</h1>
<button class="btn" id="btn">🏳️‍🌈</button>
<div class="msg" id="msg"></div>
<div class="sub" id="sub"></div>
</div>
<script>
var msgs=[
{m:'You are Gay! 🏳️‍🌈',s:'and we love that for you 💅'},
{m:'You are Black! ✊🏾',s:'and absolutely stunning 🔥'},
{m:'You are Dumb! 😂',s:'but we love you anyway lmao'},
{m:'Gay & Proud! 🌈',s:'period. no notes. 💖'},
{m:'Black & Beautiful! 🖤',s:'forever and always 👑'},
];
var idx=0;
var btn=document.getElementById('btn');
var msg=document.getElementById('msg');
var sub=document.getElementById('sub');
function tap(x,y){
var m=msgs[idx%msgs.length];idx++;
msg.classList.remove('show');
setTimeout(function(){msg.textContent=m.m;sub.textContent=m.s;msg.classList.add('show')},10);
for(var i=0;i<10;i++){
var e=document.createElement('span');
e.className='burst';
e.textContent=['🏳️‍🌈','💅','🔥','👑','🖤','💜'][Math.floor(Math.random()*6)];
var a=(36*i)*Math.PI/180;var d=60+Math.random()*80;
e.style.setProperty('--dx',Math.cos(a)*d+'px');
e.style.setProperty('--dy',Math.sin(a)*d+'px');
e.style.left=x+'px';e.style.top=y+'px';
document.body.appendChild(e);
setTimeout(function(){e.remove()},950);
}
}
var touched=false;
btn.addEventListener('touchstart',function(e){e.preventDefault();touched=true;var t=e.touches[0];tap(t.clientX,t.clientY)},{passive:false});
btn.addEventListener('click',function(e){if(touched){touched=false;return;}tap(e.clientX,e.clientY)});
</script>
</body>
</html>
